<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridgerpay - Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .auth-box {
            background: #0d1a27;
            border: 1px solid #182d40;
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6);
        }
        .auth-box h1 {
            font-size: 24px;
            font-weight: 900;
            color: #fff;
            margin-bottom: 20px;
        }
        .auth-box input {
            width: 100%;
            background: #07111d;
            border: 1px solid #182d40;
            border-radius: 9px;
            color: #c8dcea;
            padding: 12px 16px;
            font-size: 15px;
            outline: none;
            margin-bottom: 15px;
            transition: border-color 0.2s;
        }
        .auth-box input:focus {
            border-color: #00d4a8;
        }
        .auth-box button {
            width: 100%;
            background: #00d4a8;
            color: #07111d;
            border: none;
            border-radius: 9px;
            padding: 12px;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: opacity 0.15s;
        }
        .auth-box button:hover {
            opacity: 0.88;
        }
        .auth-box p {
            font-size: 12px;
            color: #3a5e78;
            margin-top: 20px;
        }
        .auth-box a {
            color: #00d4a8;
            text-decoration: none;
            font-weight: 700;
        }
        .error-msg {
            color: #ff6b85;
            font-size: 12px;
            margin-bottom: 10px;
            min-height: 18px;
        }
        #register-form {
            display: none;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- LOGIN FORM -->
        <div class="auth-box" id="login-box">
            <h1>Bridgerpay Login</h1>
            <div class="error-msg" id="login-err"></div>
            <form id="login-form">
                <input type="email" id="login-email" placeholder="Email Address" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit">Login →</button>
            </form>
            <p>Don't have an account? <a href="#" onclick="showRegister()">Register</a></p>
        </div>

        <!-- REGISTER FORM -->
        <div class="auth-box" id="register-box" style="display: none;">
            <h1>Create Account</h1>
            <div class="error-msg" id="register-err"></div>
            <form id="register-form-el">
                <input type="text" id="reg-name" placeholder="Full Name" required>
                <input type="email" id="reg-email" placeholder="Email Address" required>
                <input type="password" id="reg-password" placeholder="Password" required>
                <button type="submit">Register →</button>
            </form>
            <p>Already have an account? <a href="#" onclick="showLogin()">Login</a></p>
        </div>
    </div>

    <script>
        function showRegister() {
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('register-box').style.display = 'block';
        }

        function showLogin() {
            document.getElementById('register-box').style.display = 'none';
            document.getElementById('login-box').style.display = 'block';
        }

        // Handle Login
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-err');

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    window.location.href = 'bridgerpay-dashboard.html';
                } else {
                    errorEl.textContent = data.msg || 'Invalid credentials';
                }
            } catch (err) {
                errorEl.textContent = 'Server error. Please try again later.';
            }
        });

        // Handle Register
        document.getElementById('register-form-el').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const errorEl = document.getElementById('register-err');

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    window.location.href = 'bridgerpay-dashboard.html';
                } else {
                    errorEl.textContent = data.msg || 'Registration failed';
                }
            } catch (err) {
                errorEl.textContent = 'Server error. Please try again later.';
            }
        });

        // Check if already logged in
        if (localStorage.getItem('token')) {
            window.location.href = 'bridgerpay-dashboard.html';
        }
    </script>
</body>
</html>
