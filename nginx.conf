# ─────────────────────────────────────────────
#  Bridgerpay Dashboard — Nginx HTTP Basic Auth
#  Add this block inside your nginx server {}
#  block (usually in /etc/nginx/sites-available/)
# ─────────────────────────────────────────────

server {
    listen 80;
    server_name yourdomain.com;          # ← change this

    # Redirect HTTP → HTTPS (recommended)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name yourdomain.com;          # ← change this

    # SSL certificates (e.g. from Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # Web root — folder containing your HTML file
    root /var/www/bridgerpay;
    index bridgerpay-dashboard.html;

    location / {
        # ── HTTP Basic Auth ──────────────────
        auth_basic           "Bridgerpay Dashboard";
        auth_basic_user_file /etc/nginx/.htpasswd;
        # ────────────────────────────────────

        try_files $uri $uri/ =404;
    }
}

# ─────────────────────────────────────────────
#  HOW TO CREATE THE .htpasswd FILE
#  Install apache2-utils if not already present:
#    sudo apt install apache2-utils
#
#  Create the file (replace "admin" with your
#  chosen username):
#    sudo htpasswd -c /etc/nginx/.htpasswd admin
#
#  To add more users (no -c flag):
#    sudo htpasswd /etc/nginx/.htpasswd alice
#
#  Then reload Nginx:
#    sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────
